name: Smart CI Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'   # Weekly full run (Sunday)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Start Timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install jq
        run: sudo apt-get install -y jq

      # Simulated ML response (safe for submission)
      - name: Call ML Prediction API
        id: predict
        run: |
          response='{"failure_probability": 0.45}'
          echo "ML Response: $response"
          prob=$(echo $response | jq '.failure_probability')
          echo "failure_probability=$prob" >> $GITHUB_OUTPUT

      - name: Run Full Tests
        if: ${{ steps.predict.outputs.failure_probability > 0.6 }}
        run: echo "High risk commit → Running full tests"

      - name: Skip Heavy Tests
        if: ${{ steps.predict.outputs.failure_probability <= 0.6 }}
        run: echo "Low risk commit → Skipping heavy tests"

      - name: Fallback - Run Full Tests if ML Fails
        if: failure()
        run: echo "ML failed → Running full tests"

      - name: End Timer
        run: |
          END_TIME=$(date +%s)
          EXECUTION_TIME=$((END_TIME - $START_TIME))
          echo "Execution Time: $EXECUTION_TIME seconds"
